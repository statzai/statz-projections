name: Transfermarkt market values

# Weekly refresh of transfermarkt_market_value_snapshots from GitHub egress
# IPs — the prod server's IP is AWS-WAF-challenged (HTTP 202) since Jul 2026.
# Manual dispatch for pre-season refreshes (new promoted teams land on the
# TM pages in early July).

on:
  schedule:
    - cron: '43 5 * * 1'   # Mondays 05:43 UTC — odd minute, politer than :00
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4
      - run: python scripts/scrape_market_values.py
        env:
          STATZ_INTERNAL_API_TOKEN: ${{ secrets.STATZ_INTERNAL_API_TOKEN }}
